name: DevAssets Check

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_call:
    inputs:
      project:
        required: true
        type: string
      environment:
        required: false
        type: string
        default: production

jobs:
  asset-check:
    name: Check project assets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install DevAssets
        run: npm install -g @ryan910814/devassets

      - name: Initialize DevAssets
        run: devassets init

      - name: Register project
        run: |
          devassets add-project ${{ inputs.project || github.event.repository.name }} \
            --path=${{ github.workspace }} \
            --type=saas

      - name: Scan assets
        run: devassets scan ${{ inputs.project || github.event.repository.name }}

      - name: Check assets
        run: |
          devassets check ${{ inputs.project || github.event.repository.name }} \
            --env=${{ inputs.environment || 'production' }} \
            --fail-on-risk

      - name: Upload manifest (on push to main)
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        run: |
          devassets export ${{ inputs.project || github.event.repository.name }} \
            --env=${{ inputs.environment || 'production' }} \
            --output=devassets-manifest.yml

      - name: Archive manifest
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        uses: actions/upload-artifact@v4
        with:
          name: devassets-manifest
          path: devassets-manifest.yml
          retention-days: 30
