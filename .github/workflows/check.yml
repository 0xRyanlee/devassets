name: DevAssets Check

on:
  push:
    branches: [main, master]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".gitignore"
      - "LICENSE"
  pull_request:
    branches: [main, master]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".gitignore"
      - "LICENSE"
  workflow_call:
    inputs:
      project:
        required: true
        type: string
      environment:
        required: false
        type: string
        default: production

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  asset-check:
    name: Check project assets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install DevAssets
        run: npm install -g @hyphen-network/devassets

      - name: Initialize DevAssets
        run: devassets init

      - name: Register project
        env:
          PROJECT: ${{ inputs.project || github.event.repository.name }}
        run: |
          devassets add-project "$PROJECT" \
            --path=${{ github.workspace }} \
            --type=saas

      - name: Scan assets
        env:
          PROJECT: ${{ inputs.project || github.event.repository.name }}
        run: devassets scan "$PROJECT"

      - name: Check assets
        env:
          PROJECT: ${{ inputs.project || github.event.repository.name }}
          ENVIRONMENT: ${{ inputs.environment || 'production' }}
        run: |
          devassets check "$PROJECT" \
            --env="$ENVIRONMENT" \
            --fail-on-risk

      - name: Upload manifest (on push to main)
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        env:
          PROJECT: ${{ inputs.project || github.event.repository.name }}
          ENVIRONMENT: ${{ inputs.environment || 'production' }}
        run: |
          devassets export "$PROJECT" \
            --env="$ENVIRONMENT" \
            --output=devassets-manifest.yml

      - name: Archive manifest
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        uses: actions/upload-artifact@v4
        with:
          name: devassets-manifest
          path: devassets-manifest.yml
          retention-days: 30
